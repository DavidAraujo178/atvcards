<!DOCTYPE html>
<html lang="pt-br">

<head>
  <title>Cards</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #d3d3d3;
      align-items: center;
    }

    .title {
      display: flex;
      margin-bottom: 30px;
      font-size: 32px;
      font-weight: bold;
      padding: 30px;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: flex;
      width: 80%;
      padding: 20px;
      border-radius: 10px;
      gap: 20px;
    }

    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      width: 80%;
      padding: 20px;
      border-radius: 10px;
      background-color: white;
      
    }

    .item img {
      width: 200px;
      height: 200px;
      border-radius: 10px;
    }

    .nome {
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-weight: bold;
    }

    button {
      background-color: rgb(0, 192, 0);
      color: white;
      border-radius: 25px;
      cursor: pointer;
      border: 0px;
      padding: 15px 30px;
      font-size: 18px;
      width: 200px;
    }

    .preco {
      text-align: center;
      color: rgb(0, 0, 0);
      font-size: 25px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div>
    <div class="title">Minha Loja</div>
    <div class="container">
      <div class="item">
        <img class="item" src="images/camisa.png" alt="Foto de uma camisa de tênis de mesa.">
        <p class="nome">Camisa Tênis de Mesa - China</p>
        <p class="preco">R$49,90</p>
        <button>Comprar</button>
      </div>

      <div class="item">
        <img class="item" src="images/tenis.png" alt="Foto do tênis Lefus, proprio para tênis de mesa.">
        <p class="nome">Tênis Lefus - Tênis de Mesa</p>
        <p class="preco">R$168,90</p>
        <button>Comprar</button>
      </div>
      
      <div class="item"> <img class="item" src="images/bola.png" alt="Foto da Bolinha Tibhar 3 estrelas.">
        <p class="nome">Bola Tibhar 3 estrelas - Kit com 3 bolinhas</p>
        <p class="preco">R$39,90</p>
        <button>Comprar</button>
      </div>
    </div>
</body>

</html>
